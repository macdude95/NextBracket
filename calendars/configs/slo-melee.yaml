# SLO Melee Tournament Calendar Configuration

# Games to filter by - only tournaments including these games
games:
  - id: 1 # Super Smash Bros. Melee

# Geographic filtering - tournaments within radius of center point
location:
  center:
    latitude: 35.2828 # San Luis Obispo latitude
    longitude: -120.6596 # San Luis Obispo longitude
  radius: 50 # kilometers from center point

# Tournament owners - tournaments created by these organizers included regardless of filters (UNION logic)
owners:
  - '2821656' # Bust
  - '15246' # Bozion
  - '244140' # Juno

# Recurring tournament series fetched directly by slug pattern. Works around a
# start.gg quirk where some published tournaments never enter the search index
# and are therefore invisible to the geo and owner queries (e.g. "Don't Fall
# Down The Stairs #1", id 910413). Each series probes slugs "<slug_base>-<n>"
# for n in 1..max_iterations and fetches them directly.
tournament_series:
  - slug_base: 'don-t-fall-down-the-stairs' # Don't Fall Down The Stairs (Juno / Sera J.)
    max_iterations: 12

# Date range - fetch tournaments within ±N years of today
date_range_years: 1

# Calendar display settings
calendar:
  title: 'SLO Melee Tournaments'
  description: 'Upcoming Super Smash Bros. Melee tournaments in the San Luis Obispo area'
